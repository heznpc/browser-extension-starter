name: Template Setup

on:
  push:
    branches: [main]

jobs:
  setup:
    if: github.event.created || github.run_number == 1
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if template
        id: check
        run: |
          if [ -f "manifest.json" ]; then
            NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).name)")
            if [ "$NAME" = "My Extension" ]; then
              echo "is_template=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_template=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create setup checklist
        if: steps.check.outputs.is_template == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Setup: Configure your extension" \
            --body "$(cat <<'EOF'
          Welcome! You've created a new project from **browser-extension-starter**. Here's your setup checklist:

          ## Required
          - [ ] Update `manifest.json` — change `name`, `description`, and `version`
          - [ ] Replace icons in `assets/icons/` with your own (16/32/48/128 px)
          - [ ] Narrow `content_scripts.matches` in `manifest.json` to your target sites
          - [ ] Update `browser_specific_settings.gecko.id` if publishing to Firefox

          ## CI/CD Setup
          - [ ] **Chrome:** Add GitHub Secrets (`CWS_EXTENSION_ID`, `CWS_CLIENT_ID`, `CWS_CLIENT_SECRET`, `CWS_REFRESH_TOKEN`) — see [OAuth Setup Guide](docs/OAUTH_SETUP.md)
          - [ ] **Firefox:** Add GitHub Secrets (`AMO_JWT_ISSUER`, `AMO_JWT_SECRET`) — get keys at [AMO Developer Hub](https://addons.mozilla.org/en-US/developers/addon/api/key/)

          ## Recommended
          - [ ] Copy `docs/PRIVACY_POLICY_TEMPLATE.md` → fill in your details → host it for store listing
          - [ ] Write tests in `__tests__/` and run with `npm test`
          - [ ] Delete this issue when done

          Happy building!
          EOF
          )"
