name: CD — Chrome Web Store Deploy

on:
  push:
    branches: [main]
    paths:
      - 'manifest.json'
      - 'src/**'
      - 'assets/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          mkdir -p dist
          zip -r dist/chrome.zip manifest.json src/ assets/icons/ -x '*.DS_Store'

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: dist/chrome.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-v${{ steps.version.outputs.version }}
          path: dist/chrome.zip
