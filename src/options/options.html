<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .setting {
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .setting label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .setting-text label {
      display: block;
      margin-bottom: 6px;
    }
    .setting-text input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }
    .setting-text input:focus {
      outline: none;
      border-color: #4285f4;
    }
    .toast {
      margin-top: 12px;
      padding: 8px 12px;
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="setting">
    <label>
      <input type="checkbox" id="enabled" checked>
      Enable extension
    </label>
  </div>

  <div class="setting setting-text">
    <label for="greeting">Custom greeting</label>
    <input type="text" id="greeting" placeholder="Hello from My Extension!">
  </div>

  <div class="toast" id="toast">Settings saved</div>

  <script src="options.js"></script>
</body>
</html>
